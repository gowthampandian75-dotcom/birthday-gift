<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
color:white;
overflow:hidden;
}

.container{
padding:20px;
}

h1{
font-size:38px;
margin-bottom:10px;
animation:zoom 2s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

p{
font-size:18px;
margin-bottom:20px;
}

img{
width:200px;
max-width:90%;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4081;
color:white;
font-size:18px;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#e91e63;
}

/* Confetti */

.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday my friend anni 🎂</h1>

<p>Wishing you happiness, success and lots of cake today!</p>

<img src="photo.jpg" alt="Birthday Photo">

<br>

<button onclick="playMusic()">Play Song 🎵</button>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function playMusic(){
document.getElementById("song").play();
}

/* Create Confetti */

for(let i=0;i<120;i++){

let confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";

confetti.style.animationDuration=(Math.random()*3+2)+"s";

confetti.style.backgroundColor=
"rgb("+Math.floor(Math.random()*255)+","+
Math.floor(Math.random()*255)+","+
Math.floor(Math.random()*255)+")";

document.body.appendChild(confetti);

}

</script>

</body>
</html>
